<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Data Mahasiswa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { background-color: white; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>✏️ Edit Data Pendaftar</h2>
        <form action="/update" method="POST">
            
            <div class="form-group">
                <label for="nim">NIM (Tidak Dapat Diubah):</label>
                <input type="text" id="nim" name="nim" value="{{.NIM}}" readonly>
            </div>

            <div class="form-group">
                <label for="nama">Nama Lengkap:</label>
                <input type="text" id="nama" name="nama" value="{{.Nama}}" required>
            </div>

            <div class="form-group">
                <label for="alamat">Alamat:</label>
                <input type="text" id="alamat" name="alamat" value="{{.Alamat}}" required>
            </div>

            <div class="form-group">
                <label for="no_hp">No. HP:</label>
                <input type="text" id="no_hp" name="no_hp" value="{{.NoHP}}" required>
            </div>

            <div class="form-group">
                <label for="email">Alamat Email:</label>
                <input type="email" id="email" name="email" value="{{.Email}}" required>
            </div>

            <div class="form-group">
                <label for="jenis_kelamin">Jenis Kelamin:</label>
                <select id="jenis_kelamin" name="jenis_kelamin">
                    <option value="Laki-laki" {{if eq .JenisKelamin "Laki-laki"}}selected{{end}}>Laki-laki</option>
                    <option value="Perempuan" {{if eq .JenisKelamin "Perempuan"}}selected{{end}}>Perempuan</option>
                </select>
            </div>

            <button type="submit">Simpan Perubahan</button>
            <br><br>
            <a href="/data" style="display:block; text-align:center; color:#555;">Batal</a>
        </form>
    </div>

</body>
</html>
